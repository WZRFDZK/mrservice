<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moniteur Cuisine Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Poppins:wght@600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #090d16; color: #f8fafc; font-family: 'Poppins', sans-serif; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; }
        .live-status { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981; padding: 5px 15px; border-radius: 50px; font-size: 13px; font-weight: 700; transition: all 0.2s; }
        .live-status.error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; }
        .live-status.connecting { background: rgba(234, 179, 8, 0.1); color: #eab308; border-color: #eab308; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ticket { background: #111827; border: 2px solid #3b82f6; border-radius: 12px; padding: 20px; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s, opacity 0.3s; }
        .ticket-header { display: flex; justify-content: space-between; align-items: baseline; }
        .ticket-number { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #3b82f6; }
        .ticket-time { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #64748b; }
        .ticket-items { list-style: none; margin: 15px 0; font-family: 'JetBrains Mono', monospace; font-size: 15px; border-top: 1px dashed #1e293b; border-bottom: 1px dashed #1e293b; padding: 10px 0; }
        .btn-done { background: #1e293b; color: #fff; border: 1px solid #334155; padding: 12px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-done:hover { background: #10b981; color: #090d16; border-color: #10b981; }
        .empty-state { color: #475569; font-size: 14px; grid-column: 1 / -1; text-align: center; padding: 60px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1>Moniteur Cuisine LIVE (Supabase)</h1>
            <p style="color: #64748b; font-size: 14px;">Écran connecté par Internet au site client</p>
        </div>
        <div class="live-status connecting" id="status-badge">● CONNEXION...</div>
    </div>

    <div class="grid" id="kitchen-grid">
        <div class="empty-state" id="empty-msg">En attente de commandes...</div>
    </div>

  <script>
    const SUPABASE_URL = 'https://efmkoqkxymxrxuythtjt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Y0ZpWYE8USvaEApF6WWZQQ_mtbiGW8B';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const grid = document.getElementById('kitchen-grid');
    const statusBadge = document.getElementById('status-badge');
    const emptyMsg = document.getElementById('empty-msg');

    let channel = null;

    function setStatus(state) {
        // state: 'ok' | 'error' | 'connecting'
        statusBadge.classList.remove('error', 'connecting');
        if (state === 'ok') {
            statusBadge.textContent = '● CLOUD CONNECTÉ';
        } else if (state === 'error') {
            statusBadge.textContent = '● ERREUR DE CONNEXION';
            statusBadge.classList.add('error');
        } else {
            statusBadge.textContent = '● CONNEXION...';
            statusBadge.classList.add('connecting');
        }
    }

    function subscribeToOrders() {
        // Nettoie l'ancien channel s'il existe avant de recréer
        if (channel) {
            _supabase.removeChannel(channel);
        }

        setStatus('connecting');

        channel = _supabase
            .channel('room_cuisine')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'commandes' }, payload => {
                displayNewTicket(payload.new);
            })
            .subscribe((status, err) => {
                console.log("Statut de la connexion Realtime :", status, err || '');

                if (status === 'SUBSCRIBED') {
                    setStatus('ok');
                } else if (status === 'CHANNEL_ERROR') {
                    setStatus('error');
                    console.error('Erreur du channel : vérifie ta clé API et que Realtime est bien activé sur la table.', err);
                    // Tentative de reconnexion après 3 secondes
                    setTimeout(subscribeToOrders, 3000);
                } else if (status === 'TIMED_OUT') {
                    setStatus('error');
                    setTimeout(subscribeToOrders, 3000);
                } else if (status === 'CLOSED') {
                    setStatus('error');
                }
            });
    }

    subscribeToOrders();

    function displayNewTicket(order) {
        const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
        const time = order.time;

        const counts = items.reduce((acc, name) => { acc[name] = (acc[name] || 0) + 1; return acc; }, {});
        let bodyHtml = '';
        for (const [name, count] of Object.entries(counts)) {
            bodyHtml += `<li>[${count}x] ${name}</li>`;
        }

        if (emptyMsg) emptyMsg.remove();

        const card = document.createElement('div');
        card.className = 'ticket';
        card.id = `t-${order.id}`;
        card.innerHTML = `
            <div>
                <div class="ticket-header">
                    <span class="ticket-number">#${order.id.toString().slice(-3)}</span>
                    <span class="ticket-time">${time}</span>
                </div>
                <ul class="ticket-items">
                    ${bodyHtml}
                </ul>
            </div>
            <button class="btn-done" onclick="completeOrder(${order.id})">Prêt !</button>
        `;

        grid.appendChild(card);
        playAlertSound();
    }

    function completeOrder(id) {
        const card = document.getElementById(`t-${id}`);
        if (card) {
            card.style.transform = 'scale(0.8)';
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                if (grid.children.length === 0) {
                    grid.innerHTML = '<div class="empty-state" id="empty-msg">En attente de commandes...</div>';
                }
            }, 300);
        }
    }

    function playAlertSound() {
        const context = new (window.AudioContext || window.webkitAudioContext)();

        function r(f, d, o) {
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(f, context.currentTime + o);
            gain.gain.setValueAtTime(0.2, context.currentTime + o);
            gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + o + d);
            osc.connect(gain);
            gain.connect(context.destination);
            osc.start(context.currentTime + o);
            osc.stop(context.currentTime + o + d);
        }

        r(523.25, 0.15, 0);
        r(659.25, 0.15, 0.15);
        r(783.99, 0.3, 0.3);
    }
</script>
</body>
</html>
